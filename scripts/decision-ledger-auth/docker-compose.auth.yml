# oauth2-proxy for Decision Ledger Demo (Entra ID / OIDC)
# Run on the nginx server (e.g. garethapi.com / 91.99.203.148).
#
# Required on server (do not commit):
#   - .env with DOMAIN, TENANT_ID, CLIENT_ID, CLIENT_SECRET, COOKIE_SECRET
#   - allowed_emails.txt (one email per line)
#
# See: docs/DEPLOY-HETZNER-ENTRA-OAUTH2PROXY.md

services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --provider=oidc
      - --oidc-issuer-url=https://login.microsoftonline.com/${TENANT_ID}/v2.0
      - --client-id=${CLIENT_ID}
      - --client-secret=${CLIENT_SECRET}
      - --cookie-secret=${COOKIE_SECRET}
      - --cookie-secure=true
      - --cookie-samesite=lax
      - --cookie-domain=.${DOMAIN}
      - --whitelist-domain=.${DOMAIN}
      - --reverse-proxy=true
      - --http-address=0.0.0.0:4180
      - --skip-provider-button=true
      - --set-authorization-header=true
      - --set-xauthrequest=true
      - --scope=openid email profile
      - --oidc-email-claim=preferred_username
      - --authenticated-emails-file=/etc/oauth2-proxy/allowed_emails.txt
    ports:
      - "4180:4180"
    volumes:
      - ./allowed_emails.txt:/etc/oauth2-proxy/allowed_emails.txt:ro
